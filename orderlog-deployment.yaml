apiVersion: v1
kind: ServiceAccount
metadata:
  name: orderlog
---
apiVersion: v1
kind: Service
metadata:
  name: orderlog
spec:
  type: ClusterIP
  selector:
    app: orderlog
  ports:
  - name: http
    port: 8080
    targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: orderlog
spec:
  replicas: 1
  selector:
    matchLabels:
      app: orderlog
  template:
    metadata:
      labels:
        app: orderlog
    spec:
      serviceAccountName: orderlog
      containers:
      - name: server
        image: gcr.io/elmoh-cloud-lab2/orderlog:v1
        ports:
        - containerPort: 8080
        env:
        - name: PORT
          value: "8080"
        - name: REDIS_ADDR
          value: "redis-cart:6379"
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 100m
            memory: 128Mi
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
